# Mypy configuration for LLM Test Platform

[mypy]
# Python version
python_version = "3.12"

# Warn about any missing imports
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false  # Gradually enable
disallow_incomplete_defs = false

# Error reporting
show_error_context = true
show_column_numbers = true
pretty = true

# Ignore missing imports for third-party packages
ignore_missing_imports = true

# Per-module options
[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[[tool.mypy.overrides]]
module = "streamlit.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "plotly.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "httpx.*"
ignore_missing_imports = true
