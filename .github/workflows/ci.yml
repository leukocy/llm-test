name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # ============================================
  # 代码质量检查
  # ============================================
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy bandit safety

      - name: Run Ruff linter
        run: ruff check . --output-format=github

      - name: Check code formatting with Black
        run: black --check .

      - name: Run type checking with mypy
        run: mypy core/ evaluators/ --ignore-missing-imports
        continue-on-error: true

      - name: Run Bandit security linter
        run: bandit -r . -f json -o bandit-report.json
        continue-on-error: true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Check dependencies for security issues
        run: safety check --json

  # ============================================
  # 安全测试
  # ============================================
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run security tests
        run: |
          pytest tests/test_security.py -v --tb=short

      - name: Upload security test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-results
          path: test-results/

  # ============================================
  # 单元测试
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v \
            --cov=core \
            --cov=evaluators \
            --cov=utils \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --junitxml=test-results/junit.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.10'
        with:
          name: coverage-report
          path: htmlcov/

  # ============================================
  # 导入验证
  # ============================================
  import-check:
    name: Import Verification
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify core imports
        run: |
          python -c "from core.benchmark_runner import BenchmarkRunner"
          python -c "from core.enhanced_parser import EnhancedAnswerParser"
          python -c "from core.failure_analyzer import FailureAnalyzer"
          python -c "from core.response_cache import ResponseCache"
          python -c "from core.url_validator import is_safe_url, validate_and_normalize_url"
          python -c "from core.safe_executor import safe_exec_code, safe_eval_math"

      - name: Verify evaluator imports
        run: |
          python -c "from evaluators.humaneval_evaluator import HumanEvalEvaluator"
          python -c "from evaluators.yaml_evaluator import YAMLEvaluator"

      - name: Verify provider imports
        run: |
          python -c "from core.providers.openai import OpenAIProvider"
          python -c "from core.providers.gemini import GeminiProvider"

  # ============================================
  # 依赖检查
  # ============================================
  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run dependency audit
        run: pip-audit --desc --format json --output audit-report.json
        continue-on-error: true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-report
          path: audit-report.json

  # ============================================
  # 文档构建
  # ============================================
  docs-build:
    name: Documentation Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install documentation dependencies
        run: |
          pip install sphinx sphinx-rtd-theme sphinx-autodoc-typehints
          pip install -r requirements.txt

      - name: Build documentation
        run: |
          if [ -d "docs" ]; then
            cd docs && make html
          else
            echo "No docs directory found, skipping documentation build"
          fi
        continue-on-error: true

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: documentation
          path: docs/_build/html/

  # ============================================
  # 代码复杂度检查
  # ============================================
  complexity-check:
    name: Code Complexity Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install radon
        run: pip install radon

      - name: Check cyclomatic complexity
        run: radon cc core/ evaluators/ -a --total-average
        continue-on-error: true

      - name: Check maintainability index
        run: radon mi core/ evaluators/ --min B
        continue-on-error: true

  # ============================================
  # 总结状态
  # ============================================
  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [lint, security-tests, unit-tests, import-check, dependency-check]
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.security-tests.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.import-check.result }}" != "success" ] || \
             [ "${{ needs.dependency-check.result }}" != "success" ]; then
            echo "::error::One or more required jobs failed"
            exit 1
          fi
          echo "All required jobs passed successfully!"
